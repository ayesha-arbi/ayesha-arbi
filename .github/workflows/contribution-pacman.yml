name: Generate Pacman Contribution Graph

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate Pacman SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate github-contribution-grid-pacman.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ayesha-arbi
          outputs: |
            dist/github-contribution-grid-pacman.svg?palette=github&type=pacman
            dist/github-contribution-grid-pacman-dark.svg?palette=github-dark&type=pacman

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
